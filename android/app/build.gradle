plugins {
    id 'com.android.application'
}

android {
    namespace 'com.zhongyao.app'
    compileSdk 34

    defaultConfig {
        applicationId 'com.zhongyao.app'
        minSdk 21
        targetSdk 34
        versionCode 4
        versionName '4.0'
    }

    signingConfigs {
        release {
            storeFile file(project.findProperty('storeFile') ?: '../app.keystore')
            storePassword project.findProperty('storePassword') ?: 'zhongyao2024'
            keyAlias project.findProperty('keyAlias') ?: 'zhongyao'
            keyPassword project.findProperty('keyPassword') ?: 'zhongyao2024'
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.release
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
