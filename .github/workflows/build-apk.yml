name: Build Android APK

on:
  push:
    branches: [master, main]
    paths:
      - 'index.html'
      - 'manifest.json'
      - 'sw.js'
      - 'icons/**'
      - 'android/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Install Gradle
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq gradle

      - name: Copy web files to assets
        run: |
          mkdir -p android/app/src/main/assets
          cp index.html android/app/src/main/assets/
          cp manifest.json android/app/src/main/assets/
          cp sw.js android/app/src/main/assets/
          cp -r icons android/app/src/main/assets/

      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore app.keystore -alias zhongyao \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass zhongyao2024 -keypass zhongyao2024 \
            -dname "CN=ZhongYao, OU=Dev, O=TCM, L=Guiyang, ST=Guizhou, C=CN" \
            -noprompt

      - name: Build APK
        working-directory: android
        run: |
          gradle wrapper --gradle-version 8.7
          ./gradlew assembleRelease \
            -PstoreFile=../app.keystore \
            -PstorePassword=zhongyao2024 \
            -PkeyAlias=zhongyao \
            -PkeyPassword=zhongyao2024

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: 中药备考神器
          path: android/app/build/outputs/apk/release/app-release.apk
