<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="theme-color" content="#2C5F4D">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="中药备考">
  <link rel="apple-touch-icon" href="icons/icon-192x192.png">
  <link rel="manifest" href="manifest.json">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>中药学备考全书</title>
  <link rel="stylesheet" href="style.css">
  <!-- 预加载字体 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- 免责声明弹窗 -->
<div class="popup-overlay" id="disclaimerPopup">
  <div class="popup-box">
    <div class="popup-icon">🌿</div>
    <h3>中药学备考全书</h3>
    <div class="popup-tags">
      <span class="popup-tag">绿色公益</span>
      <span class="popup-tag">无广告</span>
      <span class="popup-tag">纯免费</span>
    </div>
    <p class="popup-desc">
      本软件为学习辅助工具，<br>
      所有内容仅供学习参考。<br>
      不涉及任何商业行为，<br>
      无需联网，无任何收费。
    </p>
    <button class="popup-btn" id="disclaimerBtn">我知道了，开始学习</button>
  </div>
</div>

<!-- 安装提示条 -->
<div class="install-banner" id="installBanner">
  <span class="install-banner-text">📱 添加到手机桌面，随时随地背中药</span>
  <button class="install-banner-btn" onclick="installApp()">立即安装</button>
  <button class="install-banner-close" onclick="closeInstallBanner()">&times;</button>
</div>

<!-- 头部 -->
<header class="site-header">
  <div class="site-header-inner">
    <h1>中药学备考全书</h1>
    <p class="subtitle">基于第十版教材 · 350味中药 · 14天冲刺计划</p>

    <div class="theme-toggle-wrap">
      <div class="theme-toggle">
        <button class="theme-btn" id="themeOriginal" onclick="setTheme('original')">原版风格</button>
        <button class="theme-btn active" id="themeHerb" onclick="setTheme('herb')">本草美学</button>
      </div>
    </div>

    <!-- 导航 -->
    <nav class="site-nav">
      <button class="nav-tab active" data-tab="herbs">
        中药大全 <span class="nav-tab-count">350</span>
      </button>
      <button class="nav-tab" data-tab="alias">
        别名大全 <span class="nav-tab-count">55</span>
      </button>
      <button class="nav-tab" data-tab="songs">
        分类歌诀 <span class="nav-tab-count">13</span>
      </button>
      <button class="nav-tab" data-tab="quiz">
        智能背诵
      </button>
      <button class="nav-tab" data-tab="stats">
        学习统计
      </button>
      <button class="nav-tab" data-tab="plan">
        14天计划 💪
      </button>
    </nav>
  </div>
</header>

<!-- 主内容 -->
<div class="main-container">

  <!-- 学习进度条 -->
  <div class="progress-bar-wrap">
    <span class="progress-bar-icon">🌱</span>
    <span class="progress-bar-label">学习进度</span>
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="progressFill" style="width:0%;"></div>
    </div>
    <span class="progress-bar-text" id="progressText">0 / 283 味</span>
    <span class="progress-badge" id="progressBadge">掌握率 0%</span>
  </div>

  <!-- 搜索 -->
  <div class="search-section">
    <div class="search-wrap">
      <input type="text" class="search-input" id="search" placeholder="搜索药名、功效、别名、四气五味..." autocomplete="off">
      <button class="search-btn" id="searchBtn">搜索</button>
      <div class="search-suggestions" id="searchSuggestions"></div>
    </div>
  </div>

  <!-- 筛选 -->
  <div class="filter-section" id="filterSection">
    <div class="filter-row-label">掌握程度</div>
    <div class="filter-row" id="levelFilter">
      <button class="filter-btn active" data-type="all">全部</button>
      <button class="filter-btn" data-type="掌握">掌握</button>
      <button class="filter-btn" data-type="熟悉">熟悉</button>
      <button class="filter-btn" data-type="了解">了解</button>
    </div>
    <div class="filter-row-label">中药分类</div>
    <div class="filter-row" id="cateFilter"></div>
    <div class="filter-row-label">四气</div>
    <div class="filter-row" id="siqiFilter"></div>
    <div class="filter-row-label">五味</div>
    <div class="filter-row" id="wuweiFilter"></div>
  </div>

  <!-- 智能背诵 -->
  <div class="quiz-area" id="quizArea">
    <div class="quiz-header">
      <span class="quiz-title">🎯 智能背诵</span>
      <select class="quiz-mode-select" id="quizModeSelect" onchange="restartQuiz()">
        <option value="name-to-effect">药名→功效</option>
        <option value="effect-to-name">功效→药名</option>
        <option value="guijing">归经匹配</option>
      </select>
    </div>
    <div class="quiz-progress" id="quizProgress"></div>
    <div class="quiz-question" id="quizQues">点击「开始背诵」进入</div>
    <div class="quiz-answer" id="quizAns"></div>
    <div class="quiz-actions">
      <button class="quiz-btn quiz-btn-primary" onclick="nextQuiz()">下一题</button>
      <button class="quiz-btn quiz-btn-secondary" onclick="showQuizAnswer()">显示答案</button>
      <button class="quiz-btn quiz-btn-secondary" onclick="markQuiz(true)">✅ 答对了</button>
      <button class="quiz-btn quiz-btn-secondary" onclick="markQuiz(false)">❌ 答错了</button>
      <button class="quiz-btn quiz-btn-secondary" onclick="restartQuiz()">🔄 重新开始</button>
    </div>
    <div class="quiz-stats">
      <div>总题数：<span id="quizTotal">0</span></div>
      <div>正确：<span id="quizCorrect" style="color:var(--herb-green-600);">0</span></div>
      <div>错误：<span id="quizWrong" style="color:var(--cinnabar-600);">0</span></div>
    </div>
  </div>

  <!-- 错题本 -->
  <div class="error-book" id="errorBook">
    <div class="error-book-header">
      <span class="error-book-title">📝 错题本</span>
      <span class="error-book-count" id="errorCount">0 题</span>
      <button class="quiz-btn quiz-btn-secondary" onclick="clearWrong()">清空错题</button>
    </div>
    <div id="errorList"></div>
  </div>

  <!-- 结果统计 -->
  <div class="results-info" id="resultsInfo">
    <span>共找到 <strong id="resultsCount">0</strong> 条结果</span>
    <span id="resultsContext"></span>
  </div>

  <!-- 学习统计 -->
  <div class="learn-stats-section" id="learnStatsSection">
    <div id="dashboardStats"></div>
  </div>

  <!-- 14天计划 -->
  <div class="study-plan-section" id="studyPlanSection">
    <!-- 倒计时 -->
    <div class="plan-countdown" id="planCountdown"></div>

    <!-- 模式切换 -->
    <div class="plan-mode-bar">
      <button class="plan-mode-btn active" data-mode="chapter" onclick="switchPlanMode('chapter')">
        📖 按章节
      </button>
      <button class="plan-mode-btn" data-mode="random" onclick="switchPlanMode('random')">
        🎲 乱序冲刺
      </button>
    </div>

    <!-- 按章节模式 -->
    <div class="plan-chapter-mode" id="planChapterMode">
      <div class="plan-day-selector" id="planDaySelector"></div>
      <div class="plan-chapter-grid" id="planChapterGrid"></div>
    </div>

    <!-- 乱序模式 -->
    <div class="plan-random-mode" id="planRandomMode" style="display:none;">
      <div class="plan-random-controls">
        <select class="plan-level-select" id="planRandomLevel" onchange="startRandomStudy()">
          <option value="all">全部药材</option>
          <option value="掌握">仅掌握级(110味)</option>
          <option value="熟悉">仅熟悉级(97味)</option>
          <option value="了解">仅了解级(143味)</option>
        </select>
        <button class="plan-random-btn" onclick="startRandomStudy()">🔄 换一批</button>
        <span class="plan-random-count" id="planRandomCount">0/0</span>
      </div>
      <div class="plan-random-cards" id="planRandomCards"></div>
    </div>

    <!-- 刷题模式 -->
    <div class="plan-quiz-section" id="planQuizSection">
      <h3 class="plan-section-title">📝 每日刷题（30分钟）</h3>
      <div class="plan-quiz-controls">
        <select class="plan-level-select" id="planQuizLevel" onchange="restartPlanQuiz()">
          <option value="all">全部等级</option>
          <option value="掌握">仅掌握</option>
          <option value="熟悉">仅熟悉</option>
          <option value="了解">仅了解</option>
        </select>
        <select class="plan-level-select" id="planQuizChapter" onchange="restartPlanQuiz()">
          <option value="all">全部章节</option>
        </select>
        <button class="plan-random-btn" onclick="restartPlanQuiz()">🔄 重新出题</button>
      </div>
      <div class="plan-quiz-card" id="planQuizCard">
        <div class="plan-quiz-question" id="planQuizQuestion">点击「重新出题」开始刷题</div>
        <div class="plan-quiz-answer" id="planQuizAnswer" style="display:none;"></div>
      </div>
      <div class="plan-quiz-actions">
        <button class="quiz-btn quiz-btn-primary" onclick="nextPlanQuiz()">下一题</button>
        <button class="quiz-btn quiz-btn-secondary" onclick="showPlanQuizAnswer()">显示答案</button>
        <button class="quiz-btn quiz-btn-secondary" onclick="markPlanQuiz(true)">✅ 答对了</button>
        <button class="quiz-btn quiz-btn-secondary" onclick="markPlanQuiz(false)">❌ 答错了</button>
      </div>
      <div class="quiz-stats">
        <div>今日题数：<span id="planQuizTotal">0</span></div>
        <div>正确：<span id="planQuizCorrect" style="color:var(--herb-green-600);">0</span></div>
        <div>错误：<span id="planQuizWrong" style="color:var(--cinnabar-600);">0</span></div>
        <div>正确率：<span id="planQuizRate">0%</span></div>
      </div>
    </div>
  </div>

  <!-- 内容区域 -->
  <div class="card-grid" id="cardList"></div>

</div>

<script src="data.js"></script>
<script src="app.js"></script>

<script>
// ── 双主题切换 ──
function setTheme(theme) {
  document.body.classList.toggle('theme-original', theme === 'original');
  document.getElementById('themeOriginal').classList.toggle('active', theme === 'original');
  document.getElementById('themeHerb').classList.toggle('active', theme === 'herb');
  localStorage.setItem('zhongyao-theme', theme);
}

// ── 主题恢复 ──
(function() {
  var saved = localStorage.getItem('zhongyao-theme');
  if (saved) setTheme(saved);
})();

// ── 免责弹窗 ──
document.getElementById('disclaimerBtn').onclick = function() {
  document.getElementById('disclaimerPopup').style.display = 'none';
  localStorage.setItem('zhongyao-disclaimer', '1');
};
if (localStorage.getItem('zhongyao-disclaimer')) {
  document.getElementById('disclaimerPopup').style.display = 'none';
}

// ── PWA 安装 ──
var deferredPrompt = null;
var installBanner = document.getElementById('installBanner');

window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault();
  deferredPrompt = e;
  if (!localStorage.getItem('zhongyao-install-dismissed')) {
    installBanner.classList.add('show');
  }
});

function installApp() {
  if (!deferredPrompt) {
    alert('请在浏览器菜单中选择「添加到主屏幕」');
    return;
  }
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(function() {
    installBanner.classList.remove('show');
    deferredPrompt = null;
  });
}

function closeInstallBanner() {
  installBanner.classList.remove('show');
  localStorage.setItem('zhongyao-install-dismissed', '1');
}

window.addEventListener('appinstalled', function() {
  installBanner.classList.remove('show');
});

if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('sw.js').then(function(reg) {
      console.log('SW registered:', reg.scope);
    }).catch(function(err) {
      console.log('SW registration failed:', err);
    });
  });
}
</script>

</body>
</html>
