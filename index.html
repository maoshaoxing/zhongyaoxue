        *{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑",sans-serif;}
        body{background:#f5f7fa;padding:15px;max-width:1200px;margin:0 auto;}
        h1{text-align:center;color:#2c3e50;margin-bottom:15px;}
        .tabs{display:flex;gap:8px;margin-bottom:15px;flex-wrap:wrap;}
        .tab{padding:8px 16px;border:none;border-radius:6px;background:#e8f4f8;color:#2c3e50;cursor:pointer;}
        .tab.active{background:#3498db;color:#fff;}
        .search-box{margin-bottom:15px;text-align:center;}

        .filter-btn.active{background:#3498db;color:#fff;}
        .card-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:15px;}
        .card{background:#fff;border-radius:10px;padding:15px;box-shadow:0 2px 8px #00000015;cursor:pointer;transition:0.2s;}
        .card:hover{transform:translateY(-3px);box-shadow:0 4px 12px #0000002;}
        .card-title{font-size:18px;font-weight:bold;color:#2c3e50;margin-bottom:8px;display:flex;justify-content:space-between;}
        .level-tag{font-size:12px;padding:2px 6px;border-radius:4px;}
        .level-掌握{background:#ffebee;color:#c62828;}
        .level-熟悉{background:#fff8e1;color:#f57f17;}
        .level-了解{background:#e8f5e9;color:#2e7d32;}
        .card-tags{margin:8px 0;display:flex;flex-wrap:wrap;gap:5px;}
        .tag{font-size:12px;background:#f1f1f1;padding:2px 5px;border-radius:3px;}
        .card-desc{font-size:14px;color:#555;line-height:1.6;}
        .detail{margin-top:10px;padding-top:10px;border-top:1px solid #eee;display:none;}
        .detail.show{display:block;}
        .section-title{font-size:20px;color:#2c3e50;margin:20px 0 10px;padding-bottom:5px;border-bottom:2px solid #eee;}
        .quiz-area{background:#fff;border-radius:10px;padding:20px;margin-bottom:15px;box-shadow:0 2px 8px #00000015;display:none;}
        .quiz-area.show{display:block;}
        .quiz-btn{padding:8px 16px;border:none;border-radius:6px;background:#2ecc71;color:#fff;cursor:pointer;margin:5px;}
        .quiz-btn:hover{background:#27ae60;}

    </div>

        <button class="filter-btn" data-type="熟悉">仅熟悉</button>

        </div>
    </div>

    <!-- 内容容器 -->
    <div id="content">

let currentTab = 'herbs';
let currentLevel = 'all';
let currentCate = 'all';
let quizList = [];
let currentQuizIndex = 0;

// 初始化大类筛选
function initCateFilter(){
    const cates = [...new Set(TCM_HERBS.map(item => item.tags[0]))];
    const wrap = document.getElementById('cateFilter');
    wrap.innerHTML = `<button class="filter-btn active" data-cate="all">全部类别</button>`;
    cates.forEach(c=>{
        wrap.innerHTML += `<button class="filter-btn" data-cate="${c}">${c}</button>`;
    });
    wrap.querySelectorAll('.filter-btn').forEach(btn=>{
        btn.onclick=()=>{
            wrap.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
            btn.classList.add('active');
            currentCate = btn.dataset.cate;
            render();
        }
    });
}

// 渲染中药列表
function renderHerbs(){
    const kw = document.getElementById('search').value.trim().toLowerCase();
    let arr = TCM_HERBS;
    if(currentLevel!=='all') arr = arr.filter(x=>x.level===currentLevel);
    if(currentCate!=='all') arr = arr.filter(x=>x.tags[0]===currentCate);
    if(kw) arr = arr.filter(x=>
        x.name.includes(kw) || x.summary.includes(kw) || x.tags.join(',').includes(kw)
    );
    const wrap = document.getElementById('cardList');
    wrap.innerHTML = '';
    arr.forEach(item=>{
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <div class="card-title">
                <span>${item.name}</span>
                <span class="level-tag level-${item.level}">${item.level}</span>
            </div>
            <div class="card-tags">
                ${item.tags.map(t=>`<span class="tag">${t}</span>`).join('')}
            </div>
            <div class="card-desc">${item.summary}</div>
            <div class="detail">
                <p>四气：${item.siqi}</p>
                <p>五味：${item.wuwei}</p>
            </div>
        `;
        card.onclick = ()=>card.querySelector('.detail').classList.toggle('show');
        wrap.appendChild(card);
    });
}

// 渲染别名
function renderAlias(){
    const kw = document.getElementById('search').value.trim().toLowerCase();
    let arr = ALIAS_DATA;
    if(kw) arr = arr.filter(x=>x.alias.includes(kw) || x.name.includes(kw) || x.func.includes(kw));
    const wrap = document.getElementById('cardList');
    wrap.innerHTML = '';
    arr.forEach(item=>{
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <div class="card-title">${item.alias}</div>
            <div class="card-desc">别名：${item.name}</div>
            <div class="detail">
                <p>功效：${item.func}</p>
            </div>
        `;
        card.onclick = ()=>card.querySelector('.detail').classList.toggle('show');
        wrap.appendChild(card);
    });
}

// 渲染歌诀
function renderSongs(){
    const kw = document.getElementById('search').value.trim().toLowerCase();
    let arr = SONGS_DATA;
    if(kw) arr = arr.filter(x=>x.title.includes(kw) || x.content.includes(kw));
    const wrap = document.getElementById('cardList');
    wrap.innerHTML = '';
    arr.forEach(item=>{
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <div class="card-title">${item.title}</div>
            <div class="card-desc">${item.content.replace(/\n/g,'<br>')}</div>
        `;
        wrap.appendChild(card);
    });
}

// 随机背诵
function renderQuiz(){
    quizList = [...TCM_HERBS];
    quizList.sort(()=>Math.random()-0.5);
    currentQuizIndex = 0;
    document.getElementById('quizArea').classList.add('show');
    document.getElementById('quizQues').textContent = '点击「下一题」开始';
    document.getElementById('quizAns').style.display = 'none';
    document.getElementById('cardList').innerHTML = '';
}

function nextQuiz(){
    if(currentQuizIndex >= quizList.length) currentQuizIndex = 0;
    const item = quizList[currentQuizIndex];
    document.getElementById('quizQues').textContent = `${item.name} 的功效是？`;
    document.getElementById('quizAns').textContent = item.summary;
    document.getElementById('quizAns').style.display = 'none';
    currentQuizIndex++;
}

function showAns(){
    document.getElementById('quizAns').style.display = 'block';
}

// 主渲染
function render(){
    document.getElementById('quizArea').classList.remove('show');
    if(currentTab === 'herbs') renderHerbs();
    else if(currentTab === 'alias') renderAlias();
    else if(currentTab === 'songs') renderSongs();
    else if(currentTab === 'quiz') renderQuiz();
}

// 标签切换
document.querySelectorAll('.tab').forEach(tab=>{
    tab.onclick=()=>{
        document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
        tab.classList.add('active');
        currentTab = tab.dataset.tab;
        document.getElementById('levelFilter').style.display = currentTab==='herbs'?'flex':'none';
        document.getElementById('cateFilter').style.display = currentTab==='herbs'?'flex':'none';
        render();
    }
});

// 层级筛选绑定
document.querySelectorAll('#levelFilter .filter-btn').forEach(btn=>{
    btn.onclick=()=>{
        btn.parentNode.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        currentLevel = btn.dataset.type;
        render();
    }
});

// 搜索监听
document.getElementById('search').oninput = render;

// 初始化
initCateFilter();
render();
</script>
